name: CI

on:
  push:
    branches: [main]
    paths:
      - bin/**
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
    paths:
      - bin/**
      - .github/workflows/ci.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck on bash scripts
        run: |
          shopt -s nullglob
          found=0
          for f in bin/*; do
            if head -n1 "$f" | grep -qE '^#!.*\b(bash|sh)\b'; then
              echo "▶ shellcheck $f"
              shellcheck "$f" || exit 1
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No bash scripts found — skipping"
          fi

  smoke:
    name: Smoke (--help)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Run --help on every bin entry
        run: |
          shopt -s nullglob
          for f in bin/*; do
            chmod +x "$f"
            echo "▶ $f --help"
            "$f" --help || exit 1
            echo
          done

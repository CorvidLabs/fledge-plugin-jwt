<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fledge JWT Inspector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05070a;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --header-color: #fb7185;
      --payload-color: #34d399;
      --signature-color: #a78bfa;
      --radius: 16px;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.05) 0%, transparent 40%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      width: 100%;
      flex: 1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      animation: fadeIn 0.8s ease-out;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--signature-color));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .logo span {
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (max-width: 1024px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    textarea {
      width: 100%;
      height: 400px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      resize: none;
      outline: none;
      transition: border-color 0.3s ease;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .decoded-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .code-block {
      background: rgba(0, 0, 0, 0.3);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .header-block { border-color: var(--header-color); }
    .payload-block { border-color: var(--payload-color); }

    .token-part-header { color: var(--header-color); }
    .token-part-payload { color: var(--payload-color); }
    .token-part-signature { color: var(--signature-color); }

    .status-bar {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .status-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-item span:first-child { color: var(--text-muted); }
    .status-item span:last-child { font-weight: 600; }

    footer {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .placeholder-text {
      color: var(--text-muted);
      font-style: italic;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <span>Fledge JWT</span>
      </div>
      <div class="version-badge">v0.1.0</div>
    </header>

    <div class="main-grid">
      <div class="card">
        <div class="card-title">Encoded Token <span>Paste your JWT below</span></div>
        <textarea id="jwt-input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        <div id="error-display" class="error-msg">Invalid JWT format</div>
      </div>

      <div class="decoded-section">
        <div class="card">
          <div class="card-title">Header <span class="token-part-header">ALGORITHM & TOKEN TYPE</span></div>
          <div id="header-output" class="code-block header-block"><span class="placeholder-text">Waiting for input...</span></div>
        </div>

        <div class="card">
          <div class="card-title">Payload <span class="token-part-payload">DATA & CLAIMS</span></div>
          <div id="payload-output" class="code-block payload-block"><span class="placeholder-text">Waiting for input...</span></div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item">
        <span>Algorithm:</span>
        <span id="stat-alg">-</span>
      </div>
      <div class="status-item">
        <span>Type:</span>
        <span id="stat-typ">-</span>
      </div>
      <div class="status-item">
        <span>Expires:</span>
        <span id="stat-exp">-</span>
      </div>
    </div>
  </div>

  <footer>
    Built with <a href="https://github.com/CorvidLabs/fledge">Fledge</a> &bull; Premium JWT Inspector
  </footer>

  <script>
    const input = document.getElementById('jwt-input');
    const headerOut = document.getElementById('header-output');
    const payloadOut = document.getElementById('payload-output');
    const errorOut = document.getElementById('error-display');
    const statAlg = document.getElementById('stat-alg');
    const statTyp = document.getElementById('stat-typ');
    const statExp = document.getElementById('stat-exp');

    function base64UrlDecode(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4) str += '=';
      return decodeURIComponent(atob(str).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    }

    function update() {
      const token = input.value.trim();
      if (!token) {
        headerOut.innerHTML = '<span class="placeholder-text">Waiting for input...</span>';
        payloadOut.innerHTML = '<span class="placeholder-text">Waiting for input...</span>';
        errorOut.style.display = 'none';
        statAlg.textContent = '-';
        statTyp.textContent = '-';
        statExp.textContent = '-';
        return;
      }

      const parts = token.split('.');
      if (parts.length !== 3) {
        errorOut.style.display = 'block';
        return;
      }

      try {
        const header = JSON.parse(base64UrlDecode(parts[0]));
        const payload = JSON.parse(base64UrlDecode(parts[1]));

        headerOut.textContent = JSON.stringify(header, null, 2);
        payloadOut.textContent = JSON.stringify(payload, null, 2);
        errorOut.style.display = 'none';

        statAlg.textContent = header.alg || '-';
        statTyp.textContent = header.typ || 'JWT';
        
        if (payload.exp) {
          const date = new Date(payload.exp * 1000);
          statExp.textContent = date.toLocaleString();
        } else {
          statExp.textContent = 'Never';
        }

      } catch (e) {
        errorOut.style.display = 'block';
        errorOut.textContent = 'Failed to decode: ' + e.message;
      }
    }

    input.addEventListener('input', update);

    // If there's a token in the URL or similar, we could load it here
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('token')) {
      input.value = urlParams.get('token');
      update();
    }
  </script>
</body>
</html>
